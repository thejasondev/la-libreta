<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#088395"/>
      <stop offset="100%" stop-color="#09637E"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EBF4F6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="130" y="100" width="24" height="312" rx="4" fill="#075167" opacity="0.6"/>
  <!-- Book back cover -->
  <rect x="140" y="95" width="230" height="322" rx="12" fill="#7AB2B2" opacity="0.4"/>
  <!-- Book front cover / main page -->
  <rect x="154" y="90" width="228" height="322" rx="10" fill="url(#page)"/>
  <!-- Page lines -->
  <line x1="184" y1="150" x2="352" y2="150" stroke="#7AB2B2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="184" y1="180" x2="320" y2="180" stroke="#7AB2B2" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="184" y1="210" x2="340" y2="210" stroke="#7AB2B2" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="184" y1="240" x2="300" y2="240" stroke="#7AB2B2" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="184" y1="270" x2="330" y2="270" stroke="#7AB2B2" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <!-- Checkmark accent -->
  <circle cx="310" cy="340" r="32" fill="#088395" opacity="0.15"/>
  <polyline points="294,340 306,352 330,328" fill="none" stroke="#088395" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
